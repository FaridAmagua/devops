services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://autodm:autodm@postgres:5432/autodm?schema=public
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: autodm
      POSTGRES_PASSWORD: autodm
      POSTGRES_DB: autodm
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

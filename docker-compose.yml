services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: autodm
      POSTGRES_PASSWORD: autodm
      POSTGRES_DB: autodm
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

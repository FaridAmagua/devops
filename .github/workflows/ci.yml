name: CI

on:
  push:
    branches:
      - main
      - pre
      - prod
  pull_request:
    branches:
      - main
      - pre
      - prod

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: autodm
          POSTGRES_PASSWORD: autodm
          POSTGRES_DB: autodm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U autodm -d autodm_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://autodm:autodm@localhost:5432/autodm_test?schema=public

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Run tests
        run: npm test

      - name: Run build
        run: npm run build

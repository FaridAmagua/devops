name: Deploy Pre

on:
  push:
    branches:
      - pre

concurrency:
  group: deploy-pre
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to EC2 with SSM
        run: |
          cat > ssm-parameters.json <<'JSON'
          {
            "commands": [
              "sudo -u ubuntu -H bash -lc 'set -e; cd /home/ubuntu/devops; git fetch origin; git checkout pre; git pull origin pre; docker compose up --build -d; docker compose ps; curl --fail http://localhost:3000/health'"
            ]
          }
          JSON

          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --comment "Deploy AutoDM AI pre environment" \
            --parameters file://ssm-parameters.json \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          set +e
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"
          set -e

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query '{Status:Status,StandardOutput:StandardOutputContent,StandardError:StandardErrorContent}' \
            --output json

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "Status" \
            --output text)

          if [ "$STATUS" != "Success" ]; then
            exit 1
          fi

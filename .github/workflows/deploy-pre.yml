name: Deploy Pre

on:
  push:
    branches:
      - pre

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/devops
            git fetch origin
            git checkout pre
            git pull origin pre
            docker compose up --build -d
            docker compose ps
            curl --fail http://localhost:3000/health
